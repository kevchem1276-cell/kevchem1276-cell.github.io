<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tryhard - Checkout</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">

    <style>
        .checkout-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .checkout-card {
            flex: 1;
            min-width: 300px;
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
        }

        h2 {
            color: #38bdf8;
            margin-top: 0;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px 0;
            border-radius: 6px;
            border: none;
        }

        .summary {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
        }

        .checkout-btn {
            width: 100%;
            padding: 12px;
            background: #38bdf8;
            color: #020617;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }

        .checkout-btn:hover {
            background: #0ea5e9;
        }

        header h1 {
            font-family: 'Archivo Black', sans-serif;
        }
    </style>
</head>

<body>

<header>
    <h1>Tryhard</h1>
</header>

<div class="checkout-container">

    <!-- Billing Details -->
    <div class="checkout-card">
        <h2>Billing Details</h2>

        <label>Name</label>
        <input type="text" placeholder="Your Name">

        <label>Email</label>
        <input type="email" placeholder="Your Email">

        <label>Card Number</label>
        <input type="text" placeholder="1234 5678 9012 3456">

        <label>Expiration</label>
        <input type="text" placeholder="MM/YY">

        <label>CVV</label>
        <input type="text" placeholder="123">
    </div>

    <!-- Order Summary -->
    <div class="checkout-card">
        <h2>Order Summary</h2>

        <div class="summary">
            <p><strong>Product:</strong> Aimbot Pro</p>
            <p><strong>Price:</strong> 14.99€</p>
        </div>

        <br>

        <a href="success.html" class="checkout-btn">Complete Checkout</a>
    </div>

</div>

</body>
</html>
