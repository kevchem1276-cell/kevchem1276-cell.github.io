<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Tryhard</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">

    <style>
        .thankyou-container {
            max-width: 700px;
            margin: 60px auto;
            text-align: center;
            padding: 30px;
        }

        .thankyou-card {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
        }

        .success-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        h1 {
            color: #38bdf8;
            margin-top: 0;
        }

        .info {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 20px;
            background: #38bdf8;
            color: #020617;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }

        .btn-secondary {
            background: #334155;
            color: #e2e8f0;
        }

        header h1 {
            font-family: 'Archivo Black', sans-serif;
        }
    </style>
</head>

<body>

<header>
    <h1>Tryhard</h1>
</header>

<div class="thankyou-container">
    <div class="thankyou-card">

        <div class="success-icon">✅</div>

        <h1>Thank You for Your Purchase!</h1>

        <p>Your order has been successfully completed.</p>

        <div class="info">
            <p><strong>Order ID:</strong> #123456</p>
            <p><strong>Email:</strong> user@example.com</p>
        </div>

        <p>
            A confirmation email has been sent with your details and next steps.
        </p>

        <a href="Aimbot.html" class="btn">Leave a Comment</a>
        <a href="index.html" class="btn btn-secondary">Back to Home</a>

    </div>
</div>

</body>
</html>
